services:
  vaultwarden:
    container_name: vaultwarden
    image: vaultwarden/server:latest
    restart: unless-stopped
    ports:
      - 127.0.0.1:8000:80
    volumes:
      - ./vw-data:/data
    environment:
      # Set to false after your 20 employees join
      - SIGNUPS_ALLOWED=true
      # Access /admin to manage users
      #- ADMIN_TOKEN=change_this_to_a_long_random_string 
      - DOMAIN=https://vaultwrden.site-office.net
    networks:
      - proxy-net
    labels:
      - autoxpose.enable=auto # or 'auto' for automatic exposure
      - autoxpose.subdomain=vaultwrden

networks:
  proxy-net:
    external: true
