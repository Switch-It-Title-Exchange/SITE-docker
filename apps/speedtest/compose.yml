services:
  speedtest:
    container_name: openspeedtest
    image: openspeedtest/latest
    restart: unless-stopped
    ports:
      - "85:3000" # HTTP: Local IP:85 -> Container:3000
      - "455:3001" # HTTPS: Local IP:455 -> Container:3001
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    # Reference your global .env for consistency
    env_file:
      - ../../.env
    labels:
      - autoxpose.enable=true # or 'auto' for automatic exposure
      - autoxpose.port=85
      - autoxpose.subdomain=speedtest

    # --- Health Check for Beszel ---
    healthcheck:
      test: [ "CMD-SHELL", "nc -z localhost 3000 || exit 1" ] # Check if port 3000 is listening
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M # Plenty for a speed test tool
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
