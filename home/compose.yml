# --- home.yml ---
services:
  homarr-SITE:
    container_name: homarr-SITE
    image: ghcr.io/homarr-labs/homarr:latest
    restart: unless-stopped
    ports:
      - "7575:7575"
    volumes:
      - ./data/appdata:/appdata
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
      - SECRET_ENCRYPTION_KEY=${HOMARR_ENCRYPTION_KEY}
      - DOCKER_GID=989
      - DOCKER_HOST=unix:///var/run/docker.sock
    env_file: ../.env
    networks:
      - proxy-net
      - tunnel-net
    # --- Health Check for Beszel ---
    healthcheck:
      # We check the login page or main index instead of the API
      test: [ "CMD-SHELL", "wget -qO- http://localhost:7575/ || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 512M
    dns:
      - 8.8.8.8
      - 1.1.1.1
    group_add:
      - "989"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
