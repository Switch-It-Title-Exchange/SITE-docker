# --- home.yml ---
services:
  homarr-SITE:
    container_name: homarr-SITE
    image: ghcr.io/homarr-labs/homarr:latest
    restart: unless-stopped
    ports:
      - "7575:7575"
    volumes:
      - ${HOME_DATA}/data/appdata:/appdata
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
      - SECRET_ENCRYPTION_KEY=${HOMARR_ENCRYPTION_KEY}
    env_file: /docker/.env
    networks:
      - proxy-net
      - tunnel-net
    # --- Health Check for Beszel ---
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:7575/" ]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    dns:
      - 8.8.8.8
      - 1.1.1.1
    group_add:
      - "989"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
